<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance Hub - Cargando...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080b10; color: #eaf4ff; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .loader { text-align: center; }
    .spinner { width: 48px; height: 48px; border: 3px solid #263344; border-top-color: #34d399; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 8px; }
    p { color: #7a9ab5; font-size: 14px; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <h1>Performance Hub</h1>
    <p id="status">Cargando tu app personalizada...</p>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const user = params.get('user');

    if (!user) {
      document.getElementById('status').innerHTML = '<span class="error">Agrega ?user=tu_id a la URL</span>';
    } else {
      const url = 'https://rbhisfpdipzdorvyqhhb.supabase.co/functions/v1/serve-app?user=' + encodeURIComponent(user);

      fetch(url)
        .then(r => {
          if (!r.ok) throw new Error('App no encontrada');
          return r.text();
        })
        .then(html => {
          // Replace entire document with the app HTML
          document.open();
          document.write(html);
          document.close();
        })
        .catch(err => {
          document.getElementById('status').innerHTML = '<span class="error">' + err.message + '</span>';
        });
    }
  </script>
</body>
</html>
